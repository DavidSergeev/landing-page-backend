AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: >
  Landing page personal AI assistant backend.
  Exposes a Lambda Function URL with RESPONSE_STREAM mode so Gemini tokens
  are forwarded to the browser as Server-Sent Events (SSE).

Parameters:
  GoogleApiKey:
    Type: String
    Default: /landing/gemini-api-key
    Description: SSM Parameter Store path for the Google Gemini API key

  SysPromptVersion:
    Type: Number
    Default: "1"
    Description: >
      Version of the system prompt to load from DynamoDB.
      The Lambda will fetch the item with key "system_prompt_v<N>" from the config table.

Globals:
  Function:
    Runtime: python3.12
    # 60 s gives the model enough time to finish a long response
    Timeout: 60
    # 256 MB is sufficient; LangChain + Gemini client are lightweight
    MemorySize: 256

Resources:
  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: landing-page-chat
      Handler: src/main.handler
      CodeUri: .
      Description: Streaming SSE chat handler powered by Gemini
      FunctionUrlConfig:
        AuthType: NONE
        # RESPONSE_STREAM allows the Lambda to push chunks as they arrive
        # instead of buffering the entire response
        InvokeMode: RESPONSE_STREAM
        Cors:
          AllowCredentials: false
          AllowHeaders:
            - content-type
          AllowMethods:
            - POST
          AllowOrigins:
            # GitHub Pages frontend — update if your domain changes
            - "https://DavidSergeev.github.io"
          MaxAge: 86400
      Role: !GetAtt ChatFunctionRole.Arn
      Environment:
        Variables:
          GOOGLE_API_KEY_PATH: !Ref GoogleApiKey
          CONFIG_TABLE_NAME: !Ref ConfigTable
          MEETINGS_TABLE_NAME: !Ref MeetingsTable
          SYS_PROMPT_VERSION: !Ref SysPromptVersion
      # Keep Lambda warm on free tier (optional — remove if you prefer cold starts)
      # Events:
      #   KeepWarm:
      #     Type: Schedule
      #     Properties:
      #       Schedule: rate(5 minutes)

  ChatFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ChatFunctionInlinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GoogleApiKey}
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt ConfigTable.Arn
                  - !GetAtt MeetingsTable.Arn

  ConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: landing-config
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: config_key
          AttributeType: S
      KeySchema:
        - AttributeName: config_key
          KeyType: HASH

  MeetingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: landing-meetings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: meeting_id
          AttributeType: S
        - AttributeName: scheduled_at
          AttributeType: S
      KeySchema:
        - AttributeName: meeting_id
          KeyType: HASH
        - AttributeName: scheduled_at
          KeyType: RANGE

Outputs:
  ChatFunctionUrl:
    Description: >
      Lambda Function URL — paste this into your frontend as the chat endpoint.
      If Cloudflare is in front, point your Cloudflare DNS to this URL instead.
    Value: !GetAtt ChatFunctionUrl.FunctionUrl
  ChatFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ChatFunction.Arn
